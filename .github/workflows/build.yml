name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: orcanote-linux
            binary_name: orcanote
            package_name: orcanote-linux.zip
            artifact_paths: |
              orcanote-linux.zip
          - os: macos-15-intel
            artifact_name: orcanote-macos-intel
            binary_name: orcanote
            zip_name: orcanote-macos-intel.zip
            artifact_paths: |
              orcanote-macos-intel.zip
          - os: macos-latest
            artifact_name: orcanote-macos-silicon
            binary_name: orcanote
            zip_name: orcanote-macos-silicon.zip
            artifact_paths: |
              orcanote-macos-silicon.zip
          - os: windows-latest
            artifact_name: orcanote-windows
            binary_name: orcanote.exe
            package_name: orcanote-windows.zip
            artifact_paths: |
              orcanote-windows.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.3

      - name: Fetch dependencies
        shell: pwsh
        run: dart pub get

      - name: Compile executable
        shell: pwsh
        run: |
          dart compile exe -o ${{ matrix.binary_name }} -S symbols.debug bin/orcanote.dart

      - name: Package Linux executable
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail

          zip -j "${{ matrix.package_name }}" "${{ matrix.binary_name }}"

      - name: Package macOS executable as zip
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail

          zip -j "${{ matrix.zip_name }}" "${{ matrix.binary_name }}"

      - name: Package Windows executable
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.binary_name }}" -DestinationPath "${{ matrix.package_name }}" -Force

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          echo "tag_name=v${version}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: orcanote-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/orcanote-linux.zip
            dist/orcanote-macos-intel.zip
            dist/orcanote-macos-silicon.zip
            dist/orcanote-windows.zip
