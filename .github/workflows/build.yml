name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: orcanote-linux
            binary_name: orcanote-linux
          - os: macos-latest
            artifact_name: orcanote-macos
            binary_name: orcanote-macos
          - os: windows-latest
            artifact_name: orcanote-windows
            binary_name: orcanote-windows.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.3

      - name: Fetch dependencies
        shell: pwsh
        run: dart pub get

      - name: Compile executable
        shell: pwsh
        run: |
          dart compile exe -o ${{ matrix.binary_name }} -S symbols.debug bin/orcanote.dart

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.binary_name }}
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: orcanote-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/orcanote-linux
            dist/orcanote-macos
            dist/orcanote-windows.exe
